services:
  pingpong:
    build: .
    container_name: pingpong
    restart: unless-stopped
    cap_add:
      - NET_RAW
    env_file:
      - .env
    volumes:
      - pingpong-data:/data
    ports:
      - "4040:4040"
    expose:
      - "4040"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4040/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      apprise:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: pingpong-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: pingpong-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    container_name: pingpong-loki
    user: "10001:10001"
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki.yml

  promtail:
    image: grafana/promtail:latest
    container_name: pingpong-promtail
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-positions:/var/lib/promtail
    depends_on:
      - loki

  apprise:
    image: caronc/apprise:latest
    container_name: pingpong-apprise
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pingpong-data:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-positions:
