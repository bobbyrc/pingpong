<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>PingPong &mdash; {{.Title}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20y%3D%27.9em%27%20font-size%3D%2790%27%3E%F0%9F%8F%93%3C%2Ftext%3E%3C%2Fsvg%3E">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">
                <span class="logo-icon">&#9679;</span>
                PingPong
            </a>
            <nav class="nav">
                <a href="/" class="nav-link{{if eq .Active "dashboard"}} active{{end}}">Dashboard</a>
                <a href="/alerts" class="nav-link{{if eq .Active "alerts"}} active{{end}}">Alerts</a>
                <a href="/config" class="nav-link{{if eq .Active "config"}} active{{end}}">Config</a>
            </nav>
            <div class="header-status">
                <span class="status-dot" id="header-status-dot" title="Connection status"></span>
                <span class="status-label" id="header-status-label">Checking&hellip;</span>
            </div>
        </div>
    </header>

    <main class="main">
        {{template "content" .}}
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
